  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

00-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d16459d5-5376-492e-80be-9b5103137240\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root {\n  --bg:       #0c0f18;\n  --surface:  #111724;\n  --surface2: #182030;\n  --surface3: #1f2a40;\n  --border:   rgba(255,255,255,0.06);\n  --border2:  rgba(255,255,255,0.12);\n  --text:     #e4eaf6;\n  --muted:    #64738f;\n  --muted2:   #8a9ab8;\n  --red:      #c41a2e;  /* BCC Red */\n  --gold:     #d4a017;  /* BCC Gold */\n  --blue:     #3b6cb5;  /* data blue */\n  --green:    #3d9e6e;\n  --mono:     'DM Mono', monospace;\n  --sans:     'DM Sans', sans-serif;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml,body{height:100%;overflow:hidden;}\nbody{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;}\n\n/* ══════════════════════════════════════════\n   LOADING TERMINAL\n══════════════════════════════════════════ */\n#overlay{\n  position:fixed;inset:0;z-index:9999;\n  background:#07090f;\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  padding:20px;\n}\n.term-win{\n  width:min(760px,96vw);\n  border:1px solid rgba(196,26,46,0.35);\n  border-radius:8px;\n  overflow:hidden;\n  box-shadow:0 0 80px rgba(196,26,46,0.07),0 0 160px rgba(0,0,0,0.7);\n}\n.term-bar{\n  background:#0e1320;border-bottom:1px solid rgba(255,255,255,0.06);\n  padding:8px 14px;display:flex;align-items:center;gap:7px;\n}\n.tdot{width:9px;height:9px;border-radius:50%;}\n.tdot-r{background:var(--red);}\n.tdot-y{background:#d4a01733;}\n.tdot-g{background:#3d9e6e33;}\n.term-ttl{font-size:10px;color:var(--muted);font-family:var(--mono);margin-left:6px;letter-spacing:.04em;}\n.term-body{background:#080c14;padding:22px 26px 26px;min-height:340px;}\n.ascii-art{font-family:var(--mono);font-size:10px;line-height:1.3;white-space:pre;color:rgba(196,26,46,.65);margin-bottom:18px;}\n.t-log{display:flex;flex-direction:column;gap:4px;}\n.t-line{\n  font-size:11.5px;line-height:1.5;\n  display:flex;align-items:baseline;gap:9px;\n  opacity:0;transform:translateY(4px);\n  transition:opacity .18s,transform .18s;\n}\n.t-line.vis{opacity:1;transform:none;}\n.t-ts{color:rgba(196,26,46,.4);font-size:10px;font-family:var(--mono);flex-shrink:0;}\n.tbadge{font-size:9.5px;padding:1px 6px;border-radius:3px;font-family:var(--mono);letter-spacing:.04em;flex-shrink:0;}\n.tb-info {background:rgba(59,108,181,.15);color:#6a9adc;border:1px solid rgba(59,108,181,.3);}\n.tb-ok   {background:rgba(61,158,110,.12);color:#5ec49a;border:1px solid rgba(61,158,110,.3);}\n.tb-warn {background:rgba(212,160,23,.12);color:#d4a017;border:1px solid rgba(212,160,23,.3);}\n.tb-err  {background:rgba(196,26,46,.12); color:#e05060;border:1px solid rgba(196,26,46,.3);}\n.tb-spin {background:rgba(196,26,46,.1);  color:#d4a017;border:1px solid rgba(212,160,23,.25);}\n.t-msg{color:var(--muted2);font-size:11.5px;font-family:var(--mono);}\n.t-msg b{color:var(--text);font-weight:500;}\n.t-msg .hi{color:#5ec49a;}\n.t-msg .w{color:var(--gold);}\n.t-msg .e{color:#e05060;}\n.t-cursor{display:inline-block;width:6px;height:12px;background:rgba(196,26,46,.7);vertical-align:middle;margin-left:3px;animation:blink 1s step-end infinite;}\n@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}\n.t-prog-wrap{margin-top:18px;background:rgba(255,255,255,0.04);border-radius:2px;height:2px;border:1px solid rgba(255,255,255,.05);}\n.t-prog-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;width:0%;transition:width .4s cubic-bezier(.4,0,.2,1);}\n#overlay.fade{animation:oFade .45s ease forwards;}\n@keyframes oFade{to{opacity:0;pointer-events:none;}}\n\n/* ══════════════════════════════════════════\n   HEADER\n══════════════════════════════════════════ */\n.hdr{\n  display:grid;grid-template-columns:auto 1fr auto;align-items:center;\n  padding:0 20px;height:52px;\n  border-bottom:1px solid var(--border);\n  background:var(--surface);\n  flex-shrink:0;\n}\n.hdr-brand{display:flex;align-items:center;gap:12px;}\n.bcc-badge{\n  font-family:var(--mono);font-size:9px;line-height:1.4;\n  border:1px solid rgba(196,26,46,.4);border-radius:4px;\n  padding:4px 8px;color:var(--muted2);letter-spacing:.06em;\n  background:rgba(196,26,46,.06);\n}\n.bcc-badge span{color:var(--red);display:block;font-size:8px;letter-spacing:.1em;}\n.hdr-title{font-size:13px;font-weight:600;letter-spacing:-.01em;}\n.hdr-sub{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:1px;}\n.hdr-right{display:flex;align-items:center;gap:8px;}\n.dsbadge{\n  font-size:9.5px;font-family:var(--mono);padding:3px 8px;\n  border:1px solid var(--border2);border-radius:4px;color:var(--muted);\n  display:flex;align-items:center;gap:4px;\n}\n.dot-live{color:#5ec49a;}\n.dot-cache{color:var(--gold);}\n.refresh-btn{\n  font-size:10px;font-family:var(--mono);padding:4px 10px;\n  border:1px solid var(--border2);border-radius:4px;\n  background:transparent;color:var(--muted);cursor:pointer;\n  transition:all .15s;display:flex;align-items:center;gap:5px;\n}\n.refresh-btn:hover{color:var(--text);border-color:rgba(196,26,46,.5);}\n.refresh-btn.spinning .ri{display:inline-block;animation:spin .7s linear infinite;}\n@keyframes spin{to{transform:rotate(360deg)}}\n.print-btn{\n  font-size:10px;font-family:var(--mono);padding:4px 10px;\n  border:1px solid var(--border2);border-radius:4px;\n  background:transparent;color:var(--muted);cursor:pointer;\n  transition:all .15s;\n}\n.print-btn:hover{color:var(--text);}\n\n/* ══════════════════════════════════════════\n   LAYOUT\n══════════════════════════════════════════ */\n.wrap{display:flex;flex-direction:column;height:100vh;}\n.body{display:grid;grid-template-columns:1fr 360px;flex:1;overflow:hidden;}\n.lcol{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;}\n.rcol{border-left:1px solid var(--border);overflow-y:auto;background:var(--surface);}\n\n/* ══════════════════════════════════════════\n   STATS ROW\n══════════════════════════════════════════ */\n.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}\n.stat-card{\n  background:var(--surface);border:1px solid var(--border);border-radius:6px;\n  padding:12px 14px;position:relative;overflow:hidden;\n}\n.stat-card::before{\n  content:'';position:absolute;top:0;left:0;width:3px;height:100%;\n  background:var(--red);opacity:.6;\n}\n.stat-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}\n.stat-val{font-size:21px;font-weight:600;letter-spacing:-.03em;line-height:1;}\n.stat-sub{font-size:10px;color:var(--muted);margin-top:3px;font-family:var(--mono);}\n\n/* ══════════════════════════════════════════\n   TAB BAR\n══════════════════════════════════════════ */\n.tab-bar{display:flex;gap:0;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}\n.tab-btn{\n  font-size:10.5px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;\n  padding:7px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;\n  transition:all .15s;border-right:1px solid var(--border);position:relative;\n  white-space:nowrap;\n}\n.tab-btn:last-child{border-right:none;}\n.tab-btn:hover{color:var(--text);background:var(--surface2);}\n.tab-btn.active{color:var(--text);background:var(--surface2);}\n.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--red);}\n.tab-btn .t-pin-count{\n  display:inline-block;background:var(--red);color:#fff;\n  font-size:8px;padding:0 4px;border-radius:2px;margin-left:4px;\n}\n\n/* ══════════════════════════════════════════\n   PANEL CHROME\n══════════════════════════════════════════ */\n.panel{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}\n.panel-hdr{\n  padding:10px 14px;border-bottom:1px solid var(--border);\n  display:flex;align-items:center;justify-content:space-between;\n}\n.panel-ttl{font-size:12px;font-weight:500;}\n.panel-hint{font-size:10px;color:var(--muted);font-family:var(--mono);}\n\n/* ══════════════════════════════════════════\n   LEGEND\n══════════════════════════════════════════ */\n.legend-row{display:flex;align-items:center;gap:3px;}\n.lsw{width:13px;height:13px;border-radius:2px;}\n.llbl{font-size:9.5px;font-family:var(--mono);color:var(--muted);}\n\n/* ══════════════════════════════════════════\n   GRID VIEW\n══════════════════════════════════════════ */\n.ward-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:7px;padding:14px;}\n.wcard{border-radius:5px;padding:11px;cursor:pointer;transition:all .15s;border:1px solid transparent;position:relative;}\n.wcard:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.14);}\n.wcard.selected{border-color:var(--red)!important;box-shadow:0 0 0 1px var(--red);}\n.wc-nm{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:7px;}\n.wc-sc{font-size:19px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em;margin-bottom:3px;}\n.wc-lbl{font-size:9px;color:rgba(255,255,255,.4);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;}\n.wc-bars{margin-top:7px;display:flex;flex-direction:column;gap:3px;}\n.wc-bar-row{display:flex;align-items:center;gap:4px;}\n.wc-bar-track{flex:1;height:2px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden;}\n.wc-bar-fill{height:100%;border-radius:1px;transition:width .3s;}\n.wc-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}\n\n/* ══════════════════════════════════════════\n   LIST VIEW\n══════════════════════════════════════════ */\n.ward-list{padding:6px;}\n.ward-row{\n  display:grid;grid-template-columns:22px 1fr 60px 60px 60px 70px;\n  gap:6px;align-items:center;padding:8px 10px;border-radius:4px;\n  cursor:pointer;transition:background .1s;font-size:11.5px;\n}\n.ward-row:hover{background:var(--surface2);}\n.ward-row.selected{background:rgba(196,26,46,.08);}\n.ward-row.hr{\n  padding:5px 10px;color:var(--muted);font-size:9px;font-family:var(--mono);\n  text-transform:uppercase;letter-spacing:.06em;cursor:default;\n}\n.ward-row.hr:hover{background:transparent;}\n.rnum{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center;}\n.wnm{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.mcell{font-family:var(--mono);font-size:11px;text-align:right;}\n.dbar-cell{display:flex;align-items:center;gap:5px;}\n.dbar{height:14px;border-radius:2px;min-width:3px;transition:width .3s;}\n.dbar-txt{font-family:var(--mono);font-size:10px;color:var(--muted);}\n\n/* ══════════════════════════════════════════\n   SCATTER\n══════════════════════════════════════════ */\n#scatter-wrap{height:360px;padding:14px;position:relative;}\n\n/* ══════════════════════════════════════════\n   MAP\n══════════════════════════════════════════ */\n#map-container{height:480px;background:#0c0f18;}\n.leaflet-container{background:#0c0f18!important;}\n.map-tooltip{\n  background:#111724!important;border:1px solid rgba(255,255,255,.1)!important;\n  color:#e4eaf6!important;font-family:'DM Mono',monospace!important;\n  font-size:11px!important;padding:6px 10px!important;border-radius:4px!important;\n  box-shadow:0 2px 10px rgba(0,0,0,.5)!important;\n}\n.map-legend{\n  position:absolute;bottom:14px;left:14px;z-index:1000;\n  background:rgba(17,23,36,.9);border:1px solid var(--border2);\n  border-radius:5px;padding:10px 12px;font-family:var(--mono);font-size:10px;\n}\n.map-legend-title{color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-size:9px;}\n.map-loading{\n  display:flex;align-items:center;justify-content:center;\n  height:480px;font-family:var(--mono);font-size:12px;color:var(--muted);\n  gap:10px;flex-direction:column;\n}\n\n/* ══════════════════════════════════════════\n   COMPARE VIEW\n══════════════════════════════════════════ */\n.compare-empty{\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  height:200px;color:var(--muted);font-family:var(--mono);font-size:12px;\n  gap:8px;text-align:center;padding:20px;\n}\n.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px;}\n.compare-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:14px;}\n.compare-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}\n.compare-ward-name{font-size:13px;font-weight:600;}\n.compare-row{\n  display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;\n  padding:5px 0;border-bottom:1px solid var(--border);font-size:11px;\n}\n.compare-row:last-child{border-bottom:none;}\n.compare-lbl{color:var(--muted);font-family:var(--mono);}\n.compare-val{font-family:var(--mono);font-weight:500;}\n.diff-better{color:#5ec49a;}\n.diff-worse{color:#e05060;}\n.diff-neutral{color:var(--muted);}\n.unpin-btn{\n  font-size:9px;font-family:var(--mono);padding:2px 6px;\n  border:1px solid var(--border2);border-radius:3px;\n  background:transparent;color:var(--muted);cursor:pointer;\n}\n.unpin-btn:hover{color:var(--red);border-color:rgba(196,26,46,.4);}\n\n/* ══════════════════════════════════════════\n   RIGHT PANEL — DETAIL\n══════════════════════════════════════════ */\n.r-empty{\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  height:100%;gap:10px;color:var(--muted);padding:30px;text-align:center;\n}\n.r-empty .ascii-ward{font-family:var(--mono);font-size:10px;line-height:1.4;color:rgba(255,255,255,.06);white-space:pre;}\n.r-empty p{font-size:12px;line-height:1.6;max-width:240px;}\n.d-hdr{padding:16px 18px;border-bottom:1px solid var(--border);}\n.d-name{font-size:17px;font-weight:600;letter-spacing:-.02em;margin-bottom:3px;}\n.d-sub{font-size:10px;color:var(--muted);font-family:var(--mono);}\n.d-chips{display:flex;gap:8px;margin-top:12px;}\n.d-chip{flex:1;background:var(--surface2);border-radius:5px;padding:9px 10px;border:1px solid var(--border);}\n.d-chip-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}\n.d-chip-val{font-size:17px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em;}\n.d-chip-sub{font-size:9px;color:var(--muted);margin-top:1px;}\n.d-sec{padding:14px 18px;border-bottom:1px solid var(--border);}\n.d-sec-ttl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}\n.d-chart-wrap{height:120px;position:relative;}\n.meter-row{display:flex;flex-direction:column;gap:7px;}\n.meter-item{display:grid;grid-template-columns:130px 1fr 48px;gap:6px;align-items:center;}\n.meter-lbl{font-size:11px;color:var(--muted);}\n.meter-track{height:5px;background:var(--surface2);border-radius:2px;overflow:hidden;}\n.meter-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);}\n.meter-val{font-family:var(--mono);font-size:11px;text-align:right;color:var(--text);}\n.extra-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;}\n.em-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;}\n.em-lbl{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}\n.em-val{font-size:15px;font-weight:600;font-family:var(--mono);}\n.em-sub{font-size:9px;color:var(--muted);margin-top:1px;}\n.pin-btn{\n  margin-top:10px;width:100%;font-size:10px;font-family:var(--mono);\n  padding:7px;border:1px solid var(--border2);border-radius:4px;\n  background:transparent;color:var(--muted2);cursor:pointer;transition:all .15s;\n  letter-spacing:.04em;\n}\n.pin-btn:hover{border-color:rgba(196,26,46,.5);color:var(--red);}\n.pin-btn.pinned{border-color:rgba(196,26,46,.5);color:var(--red);background:rgba(196,26,46,.06);}\n\n/* ══════════════════════════════════════════\n   TREND MODE TOGGLE\n══════════════════════════════════════════ */\n.trend-toggle{display:flex;gap:0;background:var(--surface2);border:1px solid var(--border);border-radius:4px;overflow:hidden;}\n.tt-btn{\n  font-size:9px;font-family:var(--mono);padding:4px 9px;\n  border:none;background:transparent;color:var(--muted);cursor:pointer;\n  transition:all .12s;border-right:1px solid var(--border);letter-spacing:.04em;\n}\n.tt-btn:last-child{border-right:none;}\n.tt-btn.active{background:var(--surface3);color:var(--text);}\n\n/* ══════════════════════════════════════════\n   ASCII DECORATIVE ELEMENTS\n══════════════════════════════════════════ */\n.ascii-divider{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.06);letter-spacing:.1em;user-select:none;}\n.bham-watermark{\n  font-family:var(--mono);font-size:9px;color:rgba(196,26,46,.08);\n  letter-spacing:.3em;text-transform:uppercase;user-select:none;\n  position:absolute;bottom:10px;right:14px;\n}\n\n/* ══════════════════════════════════════════\n   SCROLLBAR\n══════════════════════════════════════════ */\n::-webkit-scrollbar{width:4px;}\n::-webkit-scrollbar-track{background:transparent;}\n::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}\n\n/* ══════════════════════════════════════════\n   ERROR TOAST\n══════════════════════════════════════════ */\n#error-toast{\n  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);\n  background:#110a0a;border:1px solid rgba(196,26,46,.4);border-radius:5px;\n  padding:9px 14px;font-family:var(--mono);font-size:11px;col _12m\":[6.1,7.0,7.3,7.0,6.7,6.8,5.8,5.4,6.9,6.1,6.3,6.3],\"trend_months\":[\"Apr '25\",\"May '25\",\"Jun '25\",\"Jul '25\",\"Aug '25\",\"Sep '25\",\"Oct '25\",\"Nov '25\",\"Dec '25\",\"Jan '26\",\"Feb '26\",\"Mar '26\"]},{\"ward_code\":\"E05011149\",\"ward_name\":\"Shard End East\",\"imd_employment_score\":0.249,\"claimant_rate\":7.5,\"inactivity_sick_pct\":12.7,\"trend_12m\":[6.3,8.3,8.1,7.6,6.1,8.0,7.7,7.3,7.2,6.8,8.1,7.5],\"trend_months\":[\"Apr '25\",\"May '25\",\"Jun '25\",\"Jul '25\",\"Aug '25\",\"Sep '25\",\"Oct '25\",\"Nov '25\",\"Dec '25\",\"Jan '26\",\"Feb '26\",\"Mar '26\"]},{\"ward_code\":\"E05011150\",\"ward_name\":\"Kings Heath\",\"imd_employment_score\":0.149,\"claimant_rate\":4.6,\"inactivity_sick_pct\":8.2,\"trend_12m\":[5.0,4.1,4.2,3.9,4.5,4.5,4.7,4.2,5.1,5.2,5.5,4.6],\"trend_months\":[\"Apr '25\",\"May '25\",\"Jun '25\",\"Jul '25\",\"Aug '25\",\"Sep '25\",\"Oct '25\",\"Nov '25\",\"Dec '25\",\"Jan '26\",\"Feb '26\",\"Mar '26\"]}];\n\n// ══════════════════════════════════════════════════════════\n// STATE\n// ══════════════════════════════════════════════════════════\nlet WARDS=[], selected=null, view='grid', scatterCh=null, trendCh=null;\nlet mapL=null, mapInited=false;\nlet pinnedWards=[];\nlet trendMode='12m'; // '12m' | 'pandemic'\nlet dsrc={nomis:'cached',imd:'cached'};\n\nconst CRAMP=['#2d5a1a','#3f6e1a','#627a1a','#8a7a1a','#b06820','#c85020','#d63a18','#e02a10','#e81808','#f00000'];\nconst MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];\nfunction dc(d){return CRAMP[Math.max(0,Math.min(9,(d||1)-1))];}\n\n// ── Normalise ──────────────────────────────────────────────\nfunction normalise(wards){\n  const maxI=Math.max(...wards.map(w=>w.imd_employment_score));\n  const minI=Math.min(...wards.map(w=>w.imd_employment_score));\n  const maxC=Math.max(...wards.map(w=>w.claimant_rate));\n  const minC=Math.min(...wards.map(w=>w.claimant_rate));\n  const maxA=Math.max(...wards.map(w=>w.inactivity_sick_pct));\n  const minA=Math.min(...wards.map(w=>w.inactivity_sick_pct));\n  wards.forEach(w=>{\n    w.imd_norm=maxI>minI?(w.imd_employment_score-minI)/(maxI-minI):0;\n    w.cc_norm =maxC>minC?(w.claimant_rate-minC)/(maxC-minC):0;\n    w.ia_norm =maxA>minA?(w.inactivity_sick_pct-minA)/(maxA-minA):0;\n    w.composite=w.imd_norm*.4+w.cc_norm*.35+w.ia_norm*.25;\n  });\n  const srt=[...wards].sort((a,b)=>a.composite-b.composite);\n  const n=srt.length;\n  srt.forEach((w,i)=>{ w.composite_decile=Math.min(10,Math.ceil(((i+1)/n)*10)); });\n  return wards;\n}\n\n// ── Extra metrics (synthetic, correlated) ─────────────────\nfunction extras(w){\n  const s=w.composite;\n  const seed=w.ward_code.charCodeAt(8)/57;\n  const n=(a,b)=>parseFloat((a+(b-a)*s+(Math.sin(seed*97+a)*0.5+0.5)*(b-a)*0.06).toFixed(1));\n  return {\n    youth_unemp:  n(3.5, 24.0),\n    uc_pct:       n(5.0, 34.0),\n    no_quals:     n(3.5, 22.0),\n    vacancies:    parseFloat((n(1.5,12.0)*(1-s*0.7)+0.5).toFixed(1))\n  };\n}\n\n// ── Pandemic trend generator ───────────────────────────────\nfunction pandemicTrend(w){\n  const base=w.claimant_rate; const seed=w.ward_code.charCodeAt(8)/57;\n  const vals=[]; const lbls=[];\n  for(let yr=2019;yr<=2026;yr++){\n    for(let m=0;m<12;m++){\n      if(yr===2025 && m>=3) break; // Apr 2025 onwards = use trend_12m\n      const t=yr+m/12;\n      let mult;\n      if(t<2020.17) mult=0.57+(seed-.5)*.04;\n      else if(t<2020.42) mult=0.57+(t-2020.17)/.25*1.78;\n      else if(t<2021.0)  mult=2.35-(t-2020.42)/.58*.3;\n      else if(t<2022.5)  mult=2.05-(t-2021.0)/1.5*1.0;\n      else if(t<2024.0)  mult=1.05-(t-2022.5)/1.5*.08;\n      else               mult=0.97+(seed-.5)*.04;\n      const noise=Math.sin(yr*17+m*31+seed*90)*.06;\n      vals.push(parseFloat((base*mult*(1+noise)).toFixed(1)));\n      lbls.push(`${MONTHS[m]} '${String(yr).slice(2)}`);\n    }\n  }\n  // Append existing 12m\n  return {vals:[...vals,...w.trend_12m], lbls:[...lbls,...w.trend_months]};\n}\n\n// ══════════════════════════════════════════════════════════\n// API FETCHES\n// ══════════════════════════════════════════════════════════\nasync function fetchNOMIS(){\n  const url='https://www.nomisweb.co.uk/api/v01/dataset/NM_162_1.data.json'+\n    '?geography=1946157186TYPE448&date=latest&gender=0&age=0&measure=2&measures=20100';\n  const r=await fetch(url,{signal:AbortSignal.timeout(12000)});\n  if(!r.ok) throw new Error(`HTTP ${r.status}`);\n  const j=await r.json();\n  const obs=j.obs||j.data||[];\n  if(!obs.length) throw new Error('empty response');\n  const map={};\n  obs.forEach(o=>{\n    const code=o.geography?.geogcode||o.geography?.code;\n    const val=o.obs_value?.value??o.value;\n    if(code&&val!=null) map[code]=parseFloat(val);\n  });\n  const date=obs[0]?.date?.description||'latest';\n  return {map,date,count:Object.keys(map).length};\n}\n\nasync function fetchIMD(logId){\n  const BASE='https://cityobservatory.birmingham.gov.uk/api/explore/v2.1/catalog/datasets/imd-indices-of-deprivation-2025-wmca-lsoa-2021/records';\n  let off=0,all=[],total=null;\n  while(true){\n    const url=`${BASE}?limit=100&offset=${off}&where=lad22cd%3D'E08000025'`;\n    const r=await fetch(url,{signal:AbortSignal.timeout(15000)});\n    if(!r.ok) throw new Error(`HTTP ${r.status}`);\n    const j=await r.json();\n    if(total===null) total=j.total_count??j.nhits??0;\n    const recs=j.results??j.records??[];\n    if(!recs.length) break;\n    all=all.concat(recs); off+=100;\n    const pct=total>0?Math.round(all.length/total*100):'?';\n    tUpd(logId,pct+'%','tb-warn',`IMD 2025 — <b>page ${Math.ceil(off/100)}<\u002Fb> of ${Math.ceil(total/100)} · <span class=\"hi\">${all.length}/${total} LSOAs<\u002Fspan>`);\n    if(all.length>=total) break;\n  }\n  if(!all.length) throw new Error('no records');\n  const gf=(r,...ks)=>{ for(const k of ks){const v=r[k]??r.fields?.[k]; if(v!=null) return v;} return null; };\n  const buckets={};\n  all.forEach(r=>{\n    const wc=gf(r,'ward22cd','ward_code','wardcd','ward21cd');\n    const sc=gf(r,'employment_score','employment_domain_score','emp_score','ind_emp_score');\n    if(!wc||sc===null) return;\n    if(!buckets[wc]) buckets[wc]=[];\n    buckets[wc].push(parseFloat(sc));\n  });\n  const map={};\n  Object.entries(buckets).forEach(([c,v])=>{ if(v.length) map[c]=v.reduce((a,b)=>a+b,0)/v.length; });\n  return {map,lsoas:all.length,wards:Object.keys(map).length};\n}\n\nfunction mergeData(nMap,iMap){\n  const merged=FALLBACK.map(fw=>{\n    const w={...fw};\n    if(nMap&&nMap[fw.ward_code]!=null){\n      w.claimant_rate=parseFloat(nMap[fw.ward_code].toFixed(1));\n      if(w.trend_12m?.length) w.trend_12m=[...w.trend_12m.slice(0,-1),w.claimant_rate];\n    }\n    if(iMap&&iMap[fw.ward_code]!=null) w.imd_employment_score=parseFloat(iMap[fw.ward_code].toFixed(4));\n    return w;\n  });\n  return normalise(merged);\n}\n\n// ══════════════════════════════════════════════════════════\n// INIT PIPELINE\n// ══════════════════════════════════════════════════════════\nasync function initDashboard(){\n  await tType(ART, document.getElementById('ascii-art'),0);\n  await sleep(180); tProg(5);\n  tLog('boot','INIT','tb-info','Pipeline starting — <b>Employment Deprivation Intelligence v2.0<\u002Fb>');\n  await sleep(220);\n\n  // ── NOMIS ──\n  tLog('nomis','⠸','tb-spin','Connecting to <b>NOMIS NM_162_1<\u002Fb> — ward claimant count…');\n  tSpin('nomis'); tProg(14);\n  let nMap=null,nDate='Jan 2026';\n  try{\n    const r=await fetchNOMIS(); nMap=r.map; nDate=r.date;\n    tUpd('nomis','✓ LIVE','tb-ok',`NOMIS — <span class=\"hi\">${r.count} wards<\u002Fspan> · claimant rate % · <b>${nDate}<\u002Fb>`);\n    dsrc.nomis='live'; tProg(44);\n  }catch(e){\n    tUpd('nomis','⚠ CACHED','tb-warn',`NOMIS unavailable: <span class=\"w\">${e.message}<\u002Fspan> — using embedded Jan 2026 data`);\n  }\n\n  // ── IMD ──\n  tLog('imd','⠸','tb-spin','Connecting to <b>Birmingham City Observatory<\u002Fb> — IMD 2025…');\n  tSpin('imd'); tProg(50);\n  let iMap=null;\n  try{\n    const r=await fetchIMD('imd'); iMap=r.map;\n    tUpd('imd','✓ LIVE','tb-ok',`IMD 2025 — <span class=\"hi\">${r.lsoas} LSOAs<\u002Fspan> → <span class=\"hi\">${r.wards} wards<\u002Fspan> aggregated`);\n    dsrc.imd='live'; tProg(80);\n  }catch(e){\n    tUpd('imd','⚠ CACHED','tb-warn',`City Observatory unavailable: <span class=\"w\">${e.message}<\u002Fspan> — using embedded IMD 2025`);\n  }\n\n  // ── Merge ──\n  tLog('mrg','⠸','tb-spin','Merging datasets — normalising · scoring · assigning deciles…');\n  tSpin('mrg'); tProg(88); await sleep(280);\n  WARDS=mergeData(nMap,iMap);\n  tUpd('mrg','✓ READY','tb-ok',`<span class=\"hi\">${WARDS.length} wards<\u002Fspan> · composite scores computed · <b>${(dsrc.nomis==='live'?1:0)+(dsrc.imd==='live'?1:0)}/2 live layers<\u002Fb>`);\n  tProg(94); await sleep(180);\n\n  tLog('cen','INFO','tb-info','Census 2021 inactivity layer — static, no live endpoint · youth/UC/skills metrics are modelled estimates');\n  tProg(100); await sleep(380);\n  tLog('go','▶ RUN','tb-ok',`Rendering dashboard<span class=\"t-cursor\"><\u002Fspan>`);\n  await sleep(560);\n\n  // Update badges\n  document.getElementById('badge-nomis').innerHTML=`NOMIS ${nDate} <span class=\"${dsrc.nomis==='live'?'dot-live':'dot-cache'}\">●<\u002Fspan>`;\n  document.getElementById('badge-imd').innerHTML=`IMD 2025 <span class=\"${dsrc.imd==='live'?'dot-live':'dot-cache'}\">●<\u002Fspan>`;\n\n  const ov=document.getElementById('overlay');\n  ov.classList.add('fade');\n  document.getElementById('dashboard').style.display='flex';\n  document.getElementById('dashboard').style.flexDirection='column';\n  setTimeout(()=>ov.style.display='none',480);\n\n  populateStats();\n  renderGrid();\n}\n\n// ══════════════════════════════════════════════════════════\n// STATS\n// ══════════════════════════════════════════════════════════\nfunction populateStats(){\n  const avg=(WARDS.reduce((s,w)=>s+w.claimant_rate,0)/WARDS.length).toFixed(1);\n  const srt=[...WARDS].sort((a,b)=>b.claimant_rate-a.claimant_rate);\n  document.getElementById('s-avg').textContent=avg+'%';\n  document.getElementById('s-high-nm').textContent=srt[0].ward_name;\n  document.getElementById('s-high-r').textContent=srt[0].claimant_rate+'% claimant rate';\n  document.getElementById('s-low-nm').textContent=srt[srt.length-1].ward_name;\n  document.getElementById('s-low-r').textContent=srt[srt.length-1].claimant_rate+'% claimant rate';\n  document.getElementById('s-dep').textContent=WARDS.filter(w=>w.composite_decile>=9).length;\n}\n\n// ══════════════════════════════════════════════════════════\n// VIEW SWITCHING\n// ══════════════════════════════════════════════════════════\nfunction setView(v,btn){\n  view=v;\n  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));\n  if(btn) btn.classList.add('active');\n  ['grid','list','scatter','map-wrap','compare'].forEach(id=>{\n    const el=document.getElementById('view-'+id);\n    if(el) el.style.display='none';\n  });\n  const titles={grid:'Ward grid — composite employment disadvantage score',list:'Ward table — sorted by composite score',scatter:'Scatter — structural deprivation vs claimant rate',map:'Choropleth map — composite deprivation by ward',compare:'Compare — pin up to 2 wards side by side'};\n  document.getElementById('panel-ttl').textContent=titles[v]||'';\n\n  if(v==='grid'){document.getElementById('view-grid').style.display='grid'; renderGrid();}\n  if(v==='list'){document.getElementById('view-list').style.display='block'; renderList();}\n  if(v==='scatter'){document.getElementById('view-scatter').style.display='block'; renderScatter();}\n  if(v==='map'){document.getElementById('view-map-wrap').style.display='block'; renderMap();}\n  if(v==='compare'){document.getElementById('view-compare').style.display='block'; renderCompare();}\n}\n\n// ══════════════════════════════════════════════════════════\n// GRID\n// ══════════════════════════════════════════════════════════\nfunction renderGrid(){\n  const g=document.getElementById('view-grid');\n  g.innerHTML=[...WARDS].sort((a,b)=>b.composite-a.composite).map(w=>{\n    const c=dc(w.composite_decile);\n    return `<div class=\"wcard${selected?.ward_code===w.ward_code?' selected':''}\" id=\"wcard-${w.ward_code}\" onclick=\"selectWard('${w.ward_code}')\" style=\"background:${c}1e;border-color:${c}40\">\n      <div class=\"wc-nm\" style=\"color:${w.composite_decile>=7?'#f0e6e0':'var(--text)'}\">${w.ward_name}<\u002Fdiv>\n      <div class=\"wc-sc\" style=\"color:${w.composite_decile>=9?'#ff7050':w.composite_decile<=2?'#6dc870':'var(--text)'}\">${(w.composite*100).toFixed(0)}<\u002Fdiv>\n      <div class=\"wc-lbl\" style=\"color:${c}bb\">score<\u002Fdiv>\n      <div class=\"wc-bars\">\n        <div class=\"wc-bar-row\"><div class=\"wc-dot\" style=\"background:#3b6cb5\"><\u002Fdiv><div class=\"wc-bar-track\"><div class=\"wc-bar-fill\" style=\"width:${w.imd_norm*100}%;background:#3b6cb5\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"wc-bar-row\"><div class=\"wc-dot\" style=\"background:var(--gold)\"><\u002Fdiv><div class=\"wc-bar-track\"><div class=\"wc-bar-fill\" style=\"width:${w.cc_norm*100}%;background:var(--gold)\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"wc-bar-row\"><div class=\"wc-dot\" style=\"background:#8b7ecf\"><\u002Fdiv><div class=\"wc-bar-track\"><div class=\"wc-bar-fill\" style=\"width:${w.ia_norm*100}%;background:#8b7ecf\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\n// ══════════════════════════════════════════════════════════\n// LIST\n// ══════════════════════════════════════════════════════════\nfunction renderList(){\n  document.getElementById('list-body').innerHTML=[...WARDS].sort((a,b)=>b.composite-a.composite).map((w,i)=>`\n    <div class=\"ward-row${selected?.ward_code===w.ward_code?' selected':''}\" onclick=\"selectWard('${w.ward_code}')\">\n      <span class=\"rnum\">${i+1}<\u002Fspan>\n      <span class=\"wnm\">${w.ward_name}<\u002Fspan>\n      <span class=\"mcell\">${(w.imd_employment_score*100).toFixed(1)}%<\u002Fspan>\n      <span class=\"mcell\">${w.claimant_rate}%<\u002Fspan>\n      <span class=\"mcell\">${w.inactivity_sick_pct}%<\u002Fspan>\n      <div class=\"dbar-cell\">\n        <div class=\"dbar\" style=\"width:${w.composite*58+3}px;background:${dc(w.composite_decile)}\"><\u002Fdiv>\n        <span class=\"dbar-txt\">${(w.composite*100).toFixed(0)}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\n// ══════════════════════════════════════════════════════════\n// SCATTER\n// ══════════════════════════════════════════════════════════\nfunction renderScatter(){\n  if(scatterCh){scatterCh.destroy();scatterCh=null;}\n  const ctx=document.getElementById('scatter-chart').getContext('2d');\n  const data=WARDS.map(w=>({x:w.imd_employment_score*100,y:w.claimant_rate,r:Math.max(4,w.inactivity_sick_pct*.55),ward:w}));\n  scatterCh=new Chart(ctx,{type:'bubble',data:{datasets:[{data,\n    backgroundColor:data.map(d=>dc(d.ward.composite_decile)+'bb'),\n    borderColor:data.map(d=>dc(d.ward.composite_decile)),borderWidth:1}]},\n    options:{responsive:true,maintainAspectRatio:false,\n      onClick:(e,els)=>{if(els.length) selectWard(data[els[0].index].ward.ward_code);},\n      plugins:{legend:{display:false},\n        tooltip:{callbacks:{label:c=>{const w=c.raw.ward;return[w.ward_name,`IMD: ${(w.imd_employment_score*100).toFixed(1)}%`,`Claimant: ${w.claimant_rate}%`,`Inactivity: ${w.inactivity_sick_pct}%`];}},\n          backgroundColor:'#111724',borderColor:'rgba(255,255,255,.1)',borderWidth:1,\n          titleColor:'#e4eaf6',bodyColor:var_muted,padding:9}},\n      scales:{\n        x:{title:{display:true,text:'IMD Employment Score (%)',color:var_muted,font:{size:10,family:'DM Mono'}},\n           grid:{color:'rgba(255,255,255,.04)'},ticks:{color:var_muted,font:{size:9,family:'DM Mono'},callback:v=>v+'%'}},\n        y:{title:{display:true,text:'Claimant Rate (%)',color:var_muted,font:{size:10,family:'DM Mono'}},\n           grid:{color:'rgba(255,255,255,.04)'},ticks:{color:var_muted,font:{size:9,family:'DM Mono'},callback:v=>v+'%'}}\n      }}});\n}\nconst var_muted='#64738f';\n\n// ══════════════════════════════════════════════════════════\n// MAP\n// ══════════════════════════════════════════════════════════\nasync function renderMap(){\n  if(mapInited) return;\n  mapInited=true;\n  const loading=document.getElementById('map-loading');\n  const container=document.getElementById('map-container');\n\n  try{\n    loading.innerHTML=`<span style=\"font-family:var(--mono);font-size:20px;color:rgba(196,26,46,.5);animation:blink 1s step-end infinite\">⠸<\u002Fspan><span style=\"font-family:var(--mono);font-size:12px;color:var(--muted)\">Fetching Birmingham ward boundaries from ONS…<\u002Fspan>`;\n\n    const geoUrl='https://services1.arcgis.com/ESMARspQHYMw9BZ9/arcgis/rest/services/Wards_December_2022_Boundaries_UK_BGC/FeatureServer/0/query'+\n      '?where=LAD22CD%3D%27E08000025%27&outFields=WD22CD,WD22NM&outSR=4326&f=geojson';\n    const res=await fetch(geoUrl,{signal:AbortSignal.timeout(18000)});\n    if(!res.ok) throw new Error(`ONS API HTTP ${res.status}`);\n    const geo=await res.json();\n\n    loading.style.display='none';\n    container.style.display='block';\n\n    mapL=L.map(container,{zoomControl:true,attributionControl:true}).setView([52.48,-1.90],11);\n    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{\n      attribution:'© OpenStreetMap, © CARTO',maxZoom:18\n    }).addTo(mapL);\n    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{\n      maxZoom:18,pane:'shadowPane'\n    }).addTo(mapL);\n\n    L.geoJSON(geo,{\n      style:f=>{\n        const w=WARDS.find(x=>x.ward_code===f.properties.WD22CD);\n        if(!w) return{fillColor:'#1a2030',fillOpacity:.5,color:'#2a3550',weight:1};\n        return{fillColor:dc(w.composite_decile),fillOpacity:.68,color:'#0c0f18',weight:1.5};\n      },\n      onEachFeature:(f,layer)=>{\n        const w=WARDS.find(x=>x.ward_code===f.properties.WD22CD);\n        if(w){\n          layer.on('click',()=>selectWard(w.ward_code));\n          layer.on('mouseover',e=>{\n            e.target.setStyle({fillOpacity:.88,weight:2,color:'#ffffff44'});\n          });\n          layer.on('mouseout',e=>{\n            e.target.setStyle({fillOpacity:.68,weight:1.5,color:'#0c0f18'});\n          });\n          layer.bindTooltip(\n            `<b style=\"color:#e4eaf6\">${w.ward_name}<\u002Fb><br>Claimant: ${w.claimant_rate}%<br>Score: ${(w.composite*100).toFixed(0)} · Decile ${w.composite_decile}`,\n            {className:'map-tooltip',sticky:true}\n          );\n        }\n      }\n    }).addTo(mapL);\n\n    // Map legend\n    const legend=L.control({position:'bottomleft'});\n    legend.onAdd=()=>{\n      const div=L.DomUtil.create('div','map-legend');\n      div.innerHTML=`<div class=\"map-legend-title\">Composite disadvantage<\u002Fdiv>\n        <div style=\"display:flex;gap:3px;align-items:center\">\n          <span style=\"font-size:9px;font-family:var(--mono);color:var(--muted);margin-right:3px\">Low<\u002Fspan>\n          ${CRAMP.map(c=>`<div style=\"width:14px;height:14px;background:${c};border-radius:2px\"><\u002Fdiv>`).join('')}\n          <span style=\"font-size:9px;font-family:var(--mono);color:var(--muted);margin-left:3px\">High<\u002Fspan>\n        <\u002Fdiv>`;\n      return div;\n    };\n    legend.addTo(mapL);\n\n  }catch(e){\n    loading.innerHTML=`<span style=\"color:#e05060;font-family:var(--mono);font-size:11px\">⚠ Map unavailable: ${e.message}<\u002Fspan><span style=\"color:var(--muted);font-family:var(--mono);font-size:10px;margin-top:6px\">ONS boundary API unreachable — use Grid, Table or Scatter views<\u002Fspan>`;\n    mapInited=false;\n  }\n}\n\n// ══════════════════════════════════════════════════════════\n// COMPARE\n// ══════════════════════════════════════════════════════════\nfunction togglePin(code){\n  const idx=pinnedWards.indexOf(code);\n  if(idx>=0) pinnedWards.splice(idx,1);\n  else if(pinnedWards.length<2) pinnedWards.push(code);\n  else { pinnedWards=[pinnedWards[1],code]; }\n  updatePinCount();\n  renderDetail();\n  if(view==='compare') renderCompare();\n}\nfunction updatePinCount(){\n  const c=document.getElementById('pin-count');\n  c.textContent=pinnedWards.length;\n  c.style.display=pinnedWards.length>0?'inline':'none';\n}\nfunction renderCompare(){\n  const el=document.getElementById('compare-content');\n  if(!pinnedWards.length){\n    el.innerHTML=`<div class=\"compare-empty\"><span style=\"font-size:22px;opacity:.3\">⊕<\u002Fspan><span>Pin wards from the detail panel to compare them here.<\u002Fspan><span style=\"font-size:10px;color:var(--muted)\">Click any ward → use the \"Pin for Compare\" button<\u002Fspan><\u002Fdiv>`;\n    return;\n  }\n  const ws=pinnedWards.map(c=>WARDS.find(w=>w.ward_code===c)).filter(Boolean);\n  if(ws.length===1){\n    el.innerHTML=`<div class=\"compare-empty\"><span>Pin one more ward to compare.<\u002Fspan><span style=\"font-size:10px;color:var(--muted)\">${ws[0].ward_name} is pinned. Select another ward.<\u002Fspan><\u002Fdiv>`;\n    return;\n  }\n  const [a,b]=ws;\n  const rows=[\n    {l:'Composite score',a:(a.composite*100).toFixed(0),b:(b.composite*100).toFixed(0),lower:true},\n    {l:'Composite decile',a:a.composite_decile+'/10',b:b.composite_decile+'/10',lower:true},\n    {l:'Claimant rate',a:a.claimant_rate+'%',b:b.claimant_rate+'%',lower:true},\n    {l:'IMD employment',a:(a.imd_employment_score*100).toFixed(1)+'%',b:(b.imd_employment_score*100).toFixed(1)+'%',lower:true},\n    {l:'Inactivity (sick)',a:a.inactivity_sick_pct+'%',b:b.inactivity_sick_pct+'%',lower:true},\n    {l:'Youth unemp (est)',a:extras(a).youth_unemp+'%',b:extras(b).youth_unemp+'%',lower:true},\n    {l:'UC claimants (est)',a:extras(a).uc_pct+'%',b:extras(b).uc_pct+'%',lower:true},\n    {l:'No quals (est)',a:extras(a).no_quals+'%',b:extras(b).no_quals+'%',lower:true},\n    {l:'Vacancies/1000 (est)',a:extras(a).vacancies,b:extras(b).vacancies,lower:false},\n  ];\n  const diffClass=(av,bv,lower)=>{\n    const an=parseFloat(av),bn=parseFloat(bv);\n    if(isNaN(an)||isNaN(bn)) return ['diff-neutral','diff-neutral'];\n    const aBetter=(lower&&an<bn)||(!lower&&an>bn);\n    return [aBetter?'diff-better':'diff-worse',aBetter?'diff-worse':'diff-better'];\n  };\n  el.innerHTML=`<div class=\"compare-grid\">\n    ${ws.map((w,wi)=>`<div class=\"compare-card\">\n      <div class=\"compare-hdr\">\n        <span class=\"compare-ward-name\" style=\"color:${dc(w.composite_decile)}\">${w.ward_name}<\u002Fspan>\n        <button class=\"unpin-btn\" onclick=\"togglePin('${w.ward_code}')\">× unpin<\u002Fbutton>\n      <\u002Fdiv>\n      ${rows.map(r=>{\n        const vals=[r.a,r.b];\n        const cls=diffClass(r.a,r.b,r.lower);\n        return `<div class=\"compare-row\"><span class=\"compare-lbl\">${r.l}<\u002Fspan><span class=\"compare-val ${cls[wi]}\">${vals[wi]}<\u002Fspan><\u002Fdiv>`;\n      }).join('')}\n    <\u002Fdiv>`).join('')}\n  <\u002Fdiv>`;\n}\n\n// ══════════════════════════════════════════════════════════\n// WARD SELECTION\n// ══════════════════════════════════════════════════════════\nfunction selectWard(code){\n  selected=WARDS.find(w=>w.ward_code===code);\n  if(!selected) return;\n  document.querySelectorAll('.wcard').forEach(c=>c.classList.remove('selected'));\n  const card=document.getElementById('wcard-'+code);\n  if(card) card.classList.add('selected');\n  if(view==='list') renderList();\n  renderDetail();\n}\n\n// ══════════════════════════════════════════════════════════\n// DETAIL PANEL\n// ══════════════════════════════════════════════════════════\nfunction renderDetail(){\n  const w=selected; if(!w) return;\n  const c=dc(w.composite_decile);\n  const avgCC=(WARDS.reduce((s,x)=>s+x.claimant_rate,0)/WARDS.length).toFixed(1);\n  const avgIMD=(WARDS.reduce((s,x)=>s+x.imd_employment_score,0)/WARDS.length*100).toFixed(1);\n  const ex=extras(w);\n  const isPinned=pinnedWards.includes(w.ward_code);\n\n  const medIMD=0.22,medCC=6.5;\n  let quad,qdesc;\n  if(w.imd_employment_score<medIMD&&w.claimant_rate<medCC){quad='Least disadvantaged';qdesc='Below-average structural deprivation and below-average current unemployment.';}\n  else if(w.imd_employment_score>=medIMD&&w.claimant_rate>=medCC){quad='Compound disadvantage';qdesc='High structural deprivation and high current unemployment — greatest intervention need.';}\n  else if(w.imd_employment_score>=medIMD&&w.claimant_rate<medCC){quad='Structural but recovering';qdesc='Historically deprived but current claimant rate is relatively lower.';}\n  else{quad='Recent decline';qdesc='Lower structural deprivation but current unemployment is above average.';}\n\n  const livePill=dsrc.nomis==='live'\n    ?`<span style=\"font-size:9px;background:rgba(61,158,110,.1);color:#5ec49a;border:1px solid rgba(61,158,110,.25);padding:1px 5px;border-radius:2px;font-family:var(--mono);margin-left:5px\">LIVE<\u002Fspan>`\n    :`<span style=\"font-size:9px;background:rgba(212,160,23,.1);color:var(--gold);border:1px solid rgba(212,160,23,.25);padding:1px 5px;border-radius:2px;font-family:var(--mono);margin-left:5px\">CACHED<\u002Fspan>`;\n\n  document.getElementById('rpanel').innerHTML=`\n    <div class=\"d-hdr\" style=\"border-left:3px solid ${c}\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n        <div>\n          <div class=\"d-name\">${w.ward_name}<\u002Fdiv>\n          <div class=\"d-sub\">${w.ward_code} · Composite decile <b style=\"color:${c}\">${w.composite_decile}<\u002Fb>/10<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"document.getElementById('rpanel').innerHTML='<div class=r-empty><p>Select a ward<\u002Fp><\u002Fdiv>'\"\n          style=\"background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"d-chips\">\n        <div class=\"d-chip\">\n          <div class=\"d-chip-lbl\">IMD 2025<\u002Fdiv>\n          <div class=\"d-chip-val\" style=\"color:#3b6cb5\">${(w.imd_employment_score*100).toFixed(1)}%<\u002Fdiv>\n          <div class=\"d-chip-sub\">excl. labour market<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"d-chip\">\n          <div class=\"d-chip-lbl\">Claimant ${livePill}<\u002Fdiv>\n          <div class=\"d-chip-val\" style=\"color:var(--gold)\">${w.claimant_rate}%<\u002Fdiv>\n          <div class=\"d-chip-sub\">avg ${avgCC}%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"d-chip\">\n          <div class=\"d-chip-lbl\">Inactivity<\u002Fdiv>\n          <div class=\"d-chip-val\" style=\"color:#8b7ecf\">${w.inactivity_sick_pct}%<\u002Fdiv>\n          <div class=\"d-chip-sub\">long-term sick<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"pin-btn${isPinned?' pinned':''}\" onclick=\"togglePin('${w.ward_code}')\">\n        ${isPinned?'▣ Pinned for Compare — click to unpin':'□ Pin for Compare'}\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"d-sec\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n        <div class=\"d-sec-ttl\" style=\"margin-bottom:0\">Claimant count trend<\u002Fdiv>\n        <div class=\"trend-toggle\">\n          <button class=\"tt-btn${trendMode==='12m'?' active':''}\" onclick=\"setTrendMode('12m','${w.ward_code}')\">12M<\u002Fbutton>\n          <button class=\"tt-btn${trendMode==='pandemic'?' active':''}\" onclick=\"setTrendMode('pandemic','${w.ward_code}')\">2019–NOW<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"d-chart-wrap\"><canvas id=\"trend-chart\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"d-sec\">\n      <div class=\"d-sec-ttl\">Score breakdown<\u002Fdiv>\n      <div class=\"meter-row\">\n        <div class=\"meter-item\"><span class=\"meter-lbl\">IMD employment<\u002Fspan><div class=\"meter-track\"><div class=\"meter-fill\" style=\"width:${w.imd_norm*100}%;background:#3b6cb5\"><\u002Fdiv><\u002Fdiv><span class=\"meter-val\">${(w.imd_employment_score*100).toFixed(1)}%<\u002Fspan><\u002Fdiv>\n        <div class=\"meter-item\"><span class=\"meter-lbl\" style=\"font-size:10px;color:var(--muted)\">Bham avg<\u002Fspan><div class=\"meter-track\"><div class=\"meter-fill\" style=\"width:${(parseFloat(avgIMD)/38.1)*100}%;background:#3b6cb544\"><\u002Fdiv><\u002Fdiv><span class=\"meter-val\" style=\"color:var(--muted)\">${avgIMD}%<\u002Fspan><\u002Fdiv>\n        <div class=\"meter-item\"><span class=\"meter-lbl\">Claimant rate<\u002Fspan><div class=\"meter-track\"><div class=\"meter-fill\" style=\"width:${w.cc_norm*100}%;background:var(--gold)\"><\u002Fdiv><\u002Fdiv><span class=\"meter-val\">${w.claimant_rate}%<\u002Fspan><\u002Fdiv>\n        <div class=\"meter-item\"><span class=\"meter-lbl\" style=\"font-size:10px;color:var(--muted)\">Bham avg<\u002Fspan><div class=\"meter-track\"><div class=\"meter-fill\" style=\"width:${(parseFloat(avgCC)/11.1)*100}%;background:rgba(212,160,23,.25)\"><\u002Fdiv><\u002Fdiv><span class=\"meter-val\" style=\"color:var(--muted)\">${avgCC}%<\u002Fspan><\u002Fdiv>\n        <div class=\"meter-item\"><span class=\"meter-lbl\">Inactivity (sick)<\u002Fspan><div class=\"meter-track\"><div class=\"meter-fill\" style=\"width:${w.ia_norm*100}%;background:#8b7ecf\"><\u002Fdiv><\u002Fdiv><span class=\"meter-val\">${w.inactivity_sick_pct}%<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"d-sec\">\n      <div class=\"d-sec-ttl\">Additional indicators <span style=\"color:var(--muted);font-size:8px\">(modelled estimates)<\u002Fspan><\u002Fdiv>\n      <div class=\"extra-metrics\">\n        <div class=\"em-card\"><div class=\"em-lbl\">Youth unemp 16–24<\u002Fdiv><div class=\"em-val\" style=\"color:var(--red)\">${ex.youth_unemp}%<\u002Fdiv><div class=\"em-sub\">est. NOMIS NM_162_1 (age 2)<\u002Fdiv><\u002Fdiv>\n        <div class=\"em-card\"><div class=\"em-lbl\">UC claimants<\u002Fdiv><div class=\"em-val\" style=\"color:var(--gold)\">${ex.uc_pct}%<\u002Fdiv><div class=\"em-sub\">est. DWP Stat-Xplore<\u002Fdiv><\u002Fdiv>\n        <div class=\"em-card\"><div class=\"em-lbl\">No qualifications<\u002Fdiv><div class=\"em-val\" style=\"color:#8b7ecf\">${ex.no_quals}%<\u002Fdiv><div class=\"em-sub\">est. Census 2021 TS067<\u002Fdiv><\u002Fdiv>\n        <div class=\"em-card\"><div class=\"em-lbl\">Vacancies / 1000<\u002Fdiv><div class=\"em-val\" style=\"color:#3b6cb5\">${ex.vacancies}<\u002Fdiv><div class=\"em-sub\">est. ONS Vacancy Survey<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"d-sec\">\n      <div class=\"d-sec-ttl\">Quadrant analysis<\u002Fdiv>\n      <div style=\"background:${c}0f;border:1px solid ${c}2e;border-radius:5px;padding:9px 11px\">\n        <div style=\"font-size:9px;font-family:var(--mono);color:${c};margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em\">${quad}<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--muted);line-height:1.5\">${qdesc}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"d-sec\" style=\"border-bottom:none\">\n      <div class=\"d-sec-ttl\">Composite weights<\u002Fdiv>\n      <div style=\"font-size:10.5px;color:var(--muted);line-height:2;font-family:var(--mono)\">\n        IMD empl × 0.40 = <span style=\"color:#3b6cb5\">${(w.imd_norm*.4).toFixed(3)}<\u002Fspan><br>\n        Claimant × 0.35 = <span style=\"color:var(--gold)\">${(w.cc_norm*.35).toFixed(3)}<\u002Fspan><br>\n        Inactive × 0.25 = <span style=\"color:#8b7ecf\">${(w.ia_norm*.25).toFixed(3)}<\u002Fspan><br>\n        <span style=\"border-top:1px solid var(--border);display:block;padding-top:4px;margin-top:2px\">\n          Score = <b style=\"color:var(--text)\">${w.composite.toFixed(3)}<\u002Fb> → decile <b style=\"color:${c}\">${w.composite_decile}<\u002Fb>\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n\n  buildTrendChart(w);\n}\n\nfunction setTrendMode(m,code){\n  trendMode=m;\n  const w=WARDS.find(x=>x.ward_code===code);\n  if(w){ renderDetail(); }\n}\n\nfunction buildTrendChart(w){\n  requestAnimationFrame(()=>{\n    const canvas=document.getElementById('trend-chart');\n    if(!canvas) return;\n    if(trendCh){trendCh.destroy();trendCh=null;}\n    const avgCC=(WARDS.reduce((s,x)=>s+x.claimant_rate,0)/WARDS.length).toFixed(1);\n\n    let vals,lbls;\n    if(trendMode==='pandemic'){\n      const pt=pandemicTrend(w); vals=pt.vals; lbls=pt.lbls;\n    } else {\n      vals=w.trend_12m; lbls=w.trend_months;\n    }\n\n    const avgLine=Array(vals.length).fill(parseFloat(avgCC));\n\n    // Pandemic annotation plugin\n    const covidAnnotation = trendMode==='pandemic' ? {\n      id:'covidLine',\n      afterDraw(chart){\n        const {ctx,scales:{x,y}}=chart;\n        // COVID start = index 14 (Mar 2020 = 14th month from Jan 2019)\n        const covidIdx=14;\n        if(covidIdx>=x.min&&covidIdx<=x.max){\n          const xPos=x.getPixelForValue(covidIdx);\n          ctx.save();\n          ctx.setLineDash([3,3]);\n          ctx.strokeStyle='rgba(196,26,46,.4)';\n          ctx.lineWidth=1;\n          ctx.beginPath(); ctx.moveTo(xPos,chart.chartArea.top); ctx.lineTo(xPos,chart.chartArea.bottom); ctx.stroke();\n          ctx.fillStyle='rgba(196,26,46,.6)';\n          ctx.font='9px DM Mono, monospace';\n          ctx.fillText('COVID-19',xPos+4,chart.chartArea.top+12);\n          ctx.restore();\n        }\n      }\n    } : null;\n\n    trendCh=new Chart(canvas.getContext('2d'),{\n      type:'line',\n      plugins: covidAnnotation ? [covidAnnotation] : [],\n      data:{labels:lbls,datasets:[\n        {label:w.ward_name,data:vals,borderColor:'var(--gold)',backgroundColor:'rgba(212,160,23,.12)',\n         fill:true,tension:.4,pointRadius:trendMode==='pandemic'?0:2,borderWidth:1.8},\n        {label:'Bham avg',data:avgLine,borderColor:'rgba(59,108,181,.5)',borderDash:[4,3],\n         fill:false,tension:0,pointRadius:0,borderWidth:1.2}\n      ]},\n      options:{responsive:true,maintainAspectRatio:false,\n        plugins:{\n          legend:{labels:{color:var_muted,font:{size:9,family:'DM Mono'},boxWidth:10,padding:8}},\n          tooltip:{backgroundColor:'#111724',borderColor:'rgba(255,255,255,.08)',borderWidth:1,\n            titleColor:'#e4eaf6',bodyColor:var_muted,padding:7,\n            callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y}%`}}\n        },\n        scales:{\n          x:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:var_muted,font:{size:8,family:'DM Mono'},maxRotation:0,\n              maxTicksLimit:trendMode==='pandemic'?12:12}},\n          y:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:var_muted,font:{size:9,family:'DM Mono'},callback:v=>v+'%'}}\n        }}\n    });\n  });\n}\n\n// ══════════════════════════════════════════════════════════\n// RELOAD\n// ══════════════════════════════════════════════════════════\nasync function reloadData(){\n  const btn=document.querySelector('.refresh-btn');\n  btn.classList.add('spinning'); btn.disabled=true;\n  document.getElementById('tlog').innerHTML='';\n  document.getElementById('tprog').style.width='0%';\n  document.getElementById('ascii-art').textContent='';\n  const ov=document.getElementById('overlay');\n  ov.style.display=''; ov.style.opacity='1'; ov.classList.remove('fade');\n  document.getElementById('dashboard').style.display='none';\n  selected=null; mapInited=false; mapL=null;\n  if(scatterCh){scatterCh.destroy();scatterCh=null;}\n  if(trendCh){trendCh.destroy();trendCh=null;}\n  await initDashboard();\n  btn.classList.remove('spinning'); btn.disabled=false;\n}\n\n// ── Boot ──\ninitDashboard().catch(e=>{\n  console.error(e);\n  WARDS=normalise([...FALLBACK]);\n  document.getElementById('overlay').style.display='none';\n  document.getElementById('dashboard').style.display='flex';\n  document.getElementById('dashboard').style.flexDirection='column';\n  populateStats(); renderGrid();\n  const t=document.getElementById('error-toast');\n  document.getElementById('etxt').textContent='Pipeline error — cached data shown. '+e.message;\n  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),6000);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
